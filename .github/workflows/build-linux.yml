name: Build Linux release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.0-desktop)'
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }

      - name: Install Wails Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build desktop frontend
        working-directory: haven-desktop/frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend to embed location
        run: cp -r haven-desktop/frontend/dist haven-desktop/cmd/haven/frontend/dist

      - name: Build Go binary
        working-directory: haven-desktop
        run: |
          VERSION="${{ inputs.version }}"
          FILENAME="haven-desktop-${VERSION#v}-linux"
          go build -ldflags="-X main.BuildHash=${{ github.sha }} -s -w" -o "$FILENAME" ./cmd/haven/
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Package tar.gz
        run: |
          cd haven-desktop
          tar -czf "${{ env.FILENAME }}.tar.gz" "${{ env.FILENAME }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          files: haven-desktop/${{ env.FILENAME }}.tar.gz
