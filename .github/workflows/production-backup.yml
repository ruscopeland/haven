name: Production database backup

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: haven-production-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: crypto-data-collector
    env:
      DATABASE_URL: ${{ secrets.HAVEN_PRODUCTION_DATABASE_URL }}
      HAVEN_BACKUP_ENCRYPTION_KEY: ${{ secrets.HAVEN_BACKUP_ENCRYPTION_KEY }}
      HAVEN_BACKUP_DIR: ${{ github.workspace }}/encrypted-backups
      PG_DUMP_BIN: /usr/lib/postgresql/18/bin/pg_dump
      PG_RESTORE_BIN: /usr/lib/postgresql/18/bin/pg_restore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backup tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-common ca-certificates
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install --yes postgresql-client-18
          pip install -r requirements.txt
      - name: Create and verify encrypted backup
        run: python tools/backup_database.py
      - name: Store encrypted recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: haven-production-backup-${{ github.run_id }}
          path: encrypted-backups/*.enc
          if-no-files-found: error
          retention-days: 30
