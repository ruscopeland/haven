name: Deploy landing page

on:
  push:
    branches: [desktop-rewrite, main]
    paths:
      - 'crypto-charting-ui/src/landing.jsx'
      - 'crypto-charting-ui/landing.html'
      - 'crypto-charting-ui/src/components/HavenLogo.jsx'
      - 'crypto-charting-ui/src/legal/content.js'
      - 'crypto-charting-ui/src/index.css'
      - 'crypto-charting-ui/src/haven-saas.css'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: crypto-charting-ui/package-lock.json

      - name: Install dependencies
        working-directory: crypto-charting-ui
        run: npm ci

      - name: Build landing page
        working-directory: crypto-charting-ui
        env:
          VITE_BUILD_ID: ${{ github.sha }}
          VITE_CLERK_PUBLISHABLE_KEY: ''
          VITE_API_URL: ''
        run: |
          # Swap landing.html as the root entry point for this deploy
          cp landing.html landing.html.bak
          cp index.html index.html.bak
          cp landing.html index.html
          # Replace public assets with landing-specific CSP
          cp -f public-landing/_headers public/_headers
          cp -f public-landing/_redirects public/_redirects
          npm run build
          # Restore originals
          mv index.html.bak index.html
          mv landing.html.bak landing.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy crypto-charting-ui/dist --project-name haven --commit-dirty
