name: Build and deploy Haven engine release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version shown to engine users (for example, 1.1.0)
        required: true
        type: string
      deploy_to_railway:
        description: Deploy the verified release to Railway after building
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: haven-engine-release
  cancel-in-progress: false

jobs:
  build:
    name: Build signed installers
    runs-on: windows-latest
    # Configure this protected GitHub environment before the first release.
    environment: engine-release
    timeout-minutes: 20
    env:
      HAVEN_ENGINE_RELEASE_PRIVATE_KEY: ${{ secrets.HAVEN_ENGINE_RELEASE_PRIVATE_KEY }}
      HAVEN_ENGINE_RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the Windows installer compiler
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          Join-Path ${env:ProgramFiles(x86)} 'NSIS' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install release builder dependencies
        run: python -m pip install --disable-pip-version-check cryptography
      - name: Build signed Windows and Linux installers
        run: python crypto-data-collector/tools/build_engine_release.py
      - name: Upload verified release files
        uses: actions/upload-artifact@v4
        with:
          name: haven-engine-${{ inputs.version }}
          path: |
            crypto-data-collector/api/static/haven-engine-windows-installer.exe
            crypto-data-collector/api/static/haven-engine-windows-installer.exe.manifest.json
            crypto-data-collector/api/static/haven-engine-linux.tar.gz
            crypto-data-collector/api/static/haven-engine-linux.tar.gz.manifest.json
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy release to Railway
    needs: build
    if: ${{ inputs.deploy_to_railway }}
    runs-on: ubuntu-latest
    # Configure this protected GitHub environment before the first production deployment.
    environment: production
    timeout-minutes: 30
    env:
      RAILWAY_TOKEN: ${{ secrets.HAVEN_RAILWAY_PROJECT_TOKEN }}
      HAVEN_RAILWAY_PROJECT_ID: ${{ vars.HAVEN_RAILWAY_PROJECT_ID }}
      HAVEN_RAILWAY_ENVIRONMENT: ${{ vars.HAVEN_RAILWAY_ENVIRONMENT }}
      HAVEN_RAILWAY_SERVICE: ${{ vars.HAVEN_RAILWAY_SERVICE }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore signed release files
        uses: actions/download-artifact@v4
        with:
          name: haven-engine-${{ inputs.version }}
          path: crypto-data-collector/api/static
      - name: Install Railway CLI
        run: npm install --global @railway/cli
      - name: Deploy API and signed release files
        run: >-
          railway up . --path-as-root --ci
          --project "$HAVEN_RAILWAY_PROJECT_ID"
          --environment "$HAVEN_RAILWAY_ENVIRONMENT"
          --service "$HAVEN_RAILWAY_SERVICE"
