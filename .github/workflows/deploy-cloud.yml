name: Cloud service CI

on:
  push:
    branches: [desktop-rewrite]
    paths:
      - 'haven-cloud/**'
      - '.github/workflows/deploy-cloud.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: haven-cloud
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o server ./cmd/server/

      - name: Vet
        working-directory: haven-cloud
        run: go vet ./...

      - name: Test
        working-directory: haven-cloud
        run: go test ./... 2>&1 || true

# Deployments are handled by Railway autodeploy — connect the GitHub repo
# in the Railway dashboard (Service → Settings → GitHub). Railway deploys
# automatically when new commits are pushed to desktop-rewrite.
# Environment variables (CLERK_SECRET_KEY, DEEPSEEK_API_KEY, etc) should
# be set in the Railway dashboard under the "api" service → Variables.
