name: Production checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto-data-collector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest httpx pip-audit
      - run: pip-audit -r requirements.txt
      - run: python -m compileall -q api database market_data tools
      - run: python -m pytest -q
      - name: Verify migrations both directions
        env:
          DATABASE_URL: sqlite:///migration-ci.db
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            crypto-charting-ui/package-lock.json
            marker-engine/package-lock.json
      - name: Frontend
        working-directory: crypto-charting-ui
        run: |
          npm ci
          npm run lint
          npm run build
          npm audit --omit=dev
      - name: Strategy SDK
        working-directory: strategy-sdk
        run: npm test
      - name: Local engine
        working-directory: marker-engine
        run: |
          npm ci
          npm test
          npm audit --omit=dev

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
